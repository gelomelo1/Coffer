version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Coffer/Coffer.ASPNET/Dockerfile.dotnet
    ports:
      - "5141:80"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
      - fastapi
    volumes:
      - ./Coffer:/app/Coffer
      - /app/Coffer/Coffer.ASPNET/bin
      - /app/Coffer/Coffer.ASPNET/obj
      - /app/Coffer/Coffer.BusinessLogic/bin
      - /app/Coffer/Coffer.BusinessLogic/obj
      - /app/Coffer/Coffer.DataAccess/bin
      - /app/Coffer/Coffer.DataAccess/obj
      - /app/Coffer/Coffer.Domain/bin
      - /app/Coffer/Coffer.Domain/obj
      - /app/Coffer/Coffer.Infrastructure/bin
      - /app/Coffer/Coffer.Infrastructure/obj
      - E:\Homework\Programming\AI\szakdolgozat\data\images:/app/data/images
      - E:\Homework\Programming\AI\szakdolgozat\data\vectors:/app/data/vectors
      - E:\Homework\Programming\AI\szakdolgozat\data\temp:/app/data/temp
      - E:\Homework\Programming\AI\Coffer\src\Coffer\Coffer.PythonService\models:/app/models

  fastapi:
    build:
      context: ./Coffer/Coffer.PythonService
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./Coffer/Coffer.PythonService:/app
      - E:\Homework\Programming\AI\szakdolgozat\data\images:/app/data/images
      - E:\Homework\Programming\AI\szakdolgozat\data\vectors:/app/data/vectors
      - E:\Homework\Programming\AI\szakdolgozat\data\temp:/app/data/temp
      - E:\Homework\Programming\AI\Coffer\src\Coffer\Coffer.PythonService\models:/app/models

  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
