name: Build & Push .NET + Python Production Images

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login to GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Python compile check
        run: python -m compileall -l ./src/Coffer/Coffer.PythonService

      # 3. Enable Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. BUILD & PUSH .NET API
      - name: Build and push .NET API
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Coffer/Coffer.ASPNET/Dockerfile.dotnet.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/coffer-api:latest
            ghcr.io/${{ github.repository_owner }}/coffer-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. BUILD & PUSH PYTHON FASTAPI
      - name: Build and push Python API
        uses: docker/build-push-action@v5
        with:
          context: ./src/Coffer/Coffer.PythonService
          file: ./src/Coffer/Coffer.PythonService/Dockerfile.python.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/coffer-python:latest
            ghcr.io/${{ github.repository_owner }}/coffer-python:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Summary
      - name: Build complete
        run: echo "Production images successfully built and pushed to GHCR"
